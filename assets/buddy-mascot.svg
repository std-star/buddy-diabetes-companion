<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="buddyMascotTitle">
  <title id="buddyMascotTitle">Buddy, a friendly cartoon dog mascot sitting and smiling</title>

  <!-- tail -->
  <path d="M232 210c28 6 46 -14 44 -34 -2 -16 -18 -22 -28 -12 -8 8 -6 22 4 26" fill="#1FAB9F"/>

  <!-- back leg / body base -->
  <ellipse cx="160" cy="240" rx="82" ry="58" fill="#1FAB9F"/>

  <!-- front paws -->
  <ellipse cx="118" cy="278" rx="20" ry="14" fill="#0B3F3C"/>
  <ellipse cx="198" cy="278" rx="20" ry="14" fill="#0B3F3C"/>

  <!-- head -->
  <circle cx="160" cy="146" r="86" fill="#1FAB9F"/>

  <!-- ears -->
  <path d="M92 96c-26 -18 -50 -14 -56 8 -6 24 14 46 40 46 18 0 32 -12 34 -28z" fill="#0B3F3C"/>
  <path d="M228 96c26 -18 50 -14 56 8 6 24 -14 46 -40 46 -18 0 -32 -12 -34 -28z" fill="#0B3F3C"/>

  <!-- muzzle patch -->
  <ellipse cx="160" cy="176" rx="52" ry="38" fill="#FFFDF9"/>

  <!-- eyes -->
  <circle cx="130" cy="132" r="10" fill="#16283D"/>
  <circle cx="190" cy="132" r="10" fill="#16283D"/>
  <circle cx="133" cy="128" r="3" fill="#FFFDF9"/>
  <circle cx="193" cy="128" r="3" fill="#FFFDF9"/>

  <!-- eyebrows for friendly expression -->
  <path d="M116 114c6 -6 18 -6 24 -2" stroke="#0B3F3C" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M180 112c6 -4 18 -4 24 2" stroke="#0B3F3C" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- nose -->
  <ellipse cx="160" cy="168" rx="14" ry="10" fill="#16283D"/>

  <!-- smile -->
  <path d="M160 178v10c0 10 -14 18 -26 12M160 188c0 10 14 18 26 12" stroke="#16283D" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- tongue -->
  <path d="M152 198c0 10 6 16 8 16s8 -6 8 -16" fill="#FF7F5C"/>

  <!-- rosy cheeks -->
  <circle cx="104" cy="164" r="10" fill="#FF7F5C" opacity="0.45"/>
  <circle cx="216" cy="164" r="10" fill="#FF7F5C" opacity="0.45"/>

  <!-- bandana (nod to alert-dog service gear, playful not clinical) -->
  <path d="M104 206c18 14 94 14 112 0l-8 30c-32 14 -64 14 -96 0z" fill="#FF7F5C"/>
  <circle cx="160" cy="222" r="5" fill="#FFFDF9"/>
</svg>
